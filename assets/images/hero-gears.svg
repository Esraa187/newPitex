<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Precision gear train engraved with an olive branch, symbolizing PITEX engineering and heritage</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="55%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#155ba9"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8edf3"/>
      <stop offset="45%" stop-color="#aebbca"/>
      <stop offset="100%" stop-color="#7c8ba0"/>
    </linearGradient>
    <linearGradient id="metalGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7fa"/>
      <stop offset="100%" stop-color="#c3ccd8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3f86d1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3f86d1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fd8a3"/>
      <stop offset="100%" stop-color="#5ba86a"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#04101f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#bgGrad)"/>
  <circle cx="560" cy="260" r="320" fill="url(#glow)"/>

  <!-- faint blueprint grid -->
  <g stroke="#3f86d1" stroke-opacity="0.12" stroke-width="1">
    <path d="M0 100H800 M0 200H800 M0 300H800 M0 400H800 M0 500H800 M0 600H800 M0 700H800 M0 800H800 M0 900H800"/>
    <path d="M100 0V1000 M200 0V1000 M300 0V1000 M400 0V1000 M500 0V1000 M600 0V1000 M700 0V1000"/>
  </g>

  <!-- hex circuitry accents, echo of the reference image's tech motif -->
  <g stroke="#3f86d1" stroke-opacity="0.35" stroke-width="2" fill="none">
    <polygon points="640,150 668,166 668,198 640,214 612,198 612,166"/>
    <polygon points="700,210 720,222 720,246 700,258 680,246 680,222"/>
    <line x1="668" y1="182" x2="700" y2="222"/>
  </g>

  <!-- gear train group -->
  <g filter="url(#softShadow)">
    <!-- large gear -->
    <g id="gearLarge" transform="translate(300,560)">
      <g fill="url(#metalGrad)" stroke="#5c6b80" stroke-width="2">
        <circle r="185"/>
      </g>
      <g fill="url(#metalGrad)" stroke="#5c6b80" stroke-width="2">
        <g>
          <path d="M0,-205 L18,-205 L18,-175 L-18,-175 Z"/>
        </g>
        <use href="#tooth" transform="rotate(30)"/>
        <use href="#tooth" transform="rotate(60)"/>
        <use href="#tooth" transform="rotate(90)"/>
        <use href="#tooth" transform="rotate(120)"/>
        <use href="#tooth" transform="rotate(150)"/>
        <use href="#tooth" transform="rotate(180)"/>
        <use href="#tooth" transform="rotate(210)"/>
        <use href="#tooth" transform="rotate(240)"/>
        <use href="#tooth" transform="rotate(270)"/>
        <use href="#tooth" transform="rotate(300)"/>
        <use href="#tooth" transform="rotate(330)"/>
      </g>
      <circle r="140" fill="none" stroke="#5c6b80" stroke-width="2" stroke-opacity="0.6"/>
      <circle r="55" fill="url(#metalGradLight)" stroke="#5c6b80" stroke-width="2"/>
      <circle r="16" fill="#0f2744"/>
    </g>

    <!-- medium gear, upper right, meshing -->
    <g id="gearMed" transform="translate(520,430)">
      <circle r="120" fill="url(#metalGrad)" stroke="#5c6b80" stroke-width="2"/>
      <use href="#toothMed" transform="rotate(0)"/>
      <use href="#toothMed" transform="rotate(40)"/>
      <use href="#toothMed" transform="rotate(80)"/>
      <use href="#toothMed" transform="rotate(120)"/>
      <use href="#toothMed" transform="rotate(160)"/>
      <use href="#toothMed" transform="rotate(200)"/>
      <use href="#toothMed" transform="rotate(240)"/>
      <use href="#toothMed" transform="rotate(280)"/>
      <use href="#toothMed" transform="rotate(320)"/>
      <circle r="90" fill="none" stroke="#5c6b80" stroke-width="1.5" stroke-opacity="0.6"/>
      <circle r="36" fill="url(#metalGradLight)" stroke="#5c6b80" stroke-width="2"/>
      <circle r="10" fill="#0f2744"/>
    </g>

    <!-- small gear, lower right -->
    <g id="gearSmall" transform="translate(560,660)">
      <circle r="78" fill="url(#metalGrad)" stroke="#5c6b80" stroke-width="2"/>
      <use href="#toothSm" transform="rotate(0)"/>
      <use href="#toothSm" transform="rotate(45)"/>
      <use href="#toothSm" transform="rotate(90)"/>
      <use href="#toothSm" transform="rotate(135)"/>
      <use href="#toothSm" transform="rotate(180)"/>
      <use href="#toothSm" transform="rotate(225)"/>
      <use href="#toothSm" transform="rotate(270)"/>
      <use href="#toothSm" transform="rotate(315)"/>
      <circle r="58" fill="none" stroke="#5c6b80" stroke-width="1.5" stroke-opacity="0.6"/>
      <circle r="24" fill="url(#metalGradLight)" stroke="#5c6b80" stroke-width="2"/>
      <circle r="7" fill="#0f2744"/>
    </g>
  </g>

  <!-- reusable tooth shapes -->
  <defs>
    <path id="tooth" d="M0,-205 L18,-205 L18,-175 L-18,-175 Z"/>
    <path id="toothMed" d="M0,-135 L13,-135 L13,-108 L-13,-108 Z"/>
    <path id="toothSm" d="M0,-88 L10,-88 L10,-68 L-10,-68 Z"/>
  </defs>

  <!-- olive branch weaving through the gear train: the signature motif -->
  <g fill="none" stroke="url(#oliveGrad)" stroke-width="5" stroke-linecap="round">
    <path d="M120 860 C 220 800, 260 720, 300 560 S 420 340, 560 210" stroke-opacity="0.9"/>
  </g>
  <g fill="url(#oliveGrad)">
    <ellipse cx="168" cy="826" rx="20" ry="10" transform="rotate(-35 168 826)"/>
    <ellipse cx="205" cy="792" rx="20" ry="10" transform="rotate(-20 205 792)"/>
    <ellipse cx="232" cy="748" rx="18" ry="9" transform="rotate(-55 232 748)"/>
    <ellipse cx="264" cy="700" rx="18" ry="9" transform="rotate(-15 264 700)"/>
    <ellipse cx="288" cy="648" rx="17" ry="8" transform="rotate(-60 288 648)"/>
    <ellipse cx="340" cy="470" rx="17" ry="8" transform="rotate(-25 340 470)"/>
    <ellipse cx="378" cy="420" rx="16" ry="8" transform="rotate(-65 378 420)"/>
    <ellipse cx="430" cy="360" rx="16" ry="8" transform="rotate(-20 430 360)"/>
    <ellipse cx="470" cy="310" rx="15" ry="7" transform="rotate(-55 470 310)"/>
    <ellipse cx="520" cy="250" rx="15" ry="7" transform="rotate(-25 520 250)"/>
  </g>
  <circle cx="120" cy="860" r="9" fill="#5ba86a"/>
  <circle cx="562" cy="206" r="9" fill="#5ba86a"/>

  <!-- fine data-readout lines, echoing precision engineering -->
  <g stroke="#9fc4ea" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M60 120 h90" />
    <path d="M60 140 h50" />
    <circle cx="60" cy="120" r="3" fill="#9fc4ea"/>
  </g>
  <text x="70" y="116" fill="#9fc4ea" font-family="Manrope, sans-serif" font-size="12" letter-spacing="2" opacity="0.8">01001 / EVOO-LINE</text>
</svg>
